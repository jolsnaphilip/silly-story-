<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funny Adventure Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Funny Adventure Generator</h1>

    <div class="input-group">
      <label for="custom-name">Enter a name:</label>
      <input id="custom-name" type="text" placeholder="Type a name">
    </div>

    <fieldset>
      <legend>Select Region</legend>

      <label>
        <input id="india" type="radio" name="region" value="india" checked>
        India
      </label>

      <label>
        <input id="uk" type="radio" name="region" value="uk">
        UK
      </label>
    </fieldset>

    <button class="generate">Create Funny Adventure</button>

    <p class="story"></p>
  </div>

  <script src="main.js"></script>

</body>
</html>
